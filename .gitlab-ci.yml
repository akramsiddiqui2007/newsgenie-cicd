script:
  - export ANSIBLE_HOST_KEY_CHECKING=False
  - cd "$CI_PROJECT_DIR"
  - python3 -m venv .venv
  - source .venv/bin/activate
  - pip install "ansible-core>=2.16,<2.17"
  
  # 1. Create the .ssh directory
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  
  # 2. Save the variable content into a file
  - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
  
  # 3. Set strict permissions (SSH will reject keys that are too "open")
  - chmod 600 ~/.ssh/id_rsa
  
  # 4. Run the playbook pointing to the FILE path, not the variable
  - ansible-playbook -i ansible/inventory/hosts.yml --private-key ~/.ssh/id_rsa ansible/playbooks/deploy_app.yml

