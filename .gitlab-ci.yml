deploy_app:
  stage: deploy
  script:
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Write the key to a file so Ansible can read the PATH
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/newsgenie_oci
    - chmod 600 ~/.ssh/newsgenie_oci
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install "ansible-core>=2.16,<2.17"
    - export ANSIBLE_HOST_KEY_CHECKING=False
    # Point to the FILE path (~/.ssh/newsgenie_oci), not the variable
    - ansible-playbook -i ansible/inventory/hosts.yml --private-key ~/.ssh/newsgenie_oci ansible/playbooks/deploy_app.yml
