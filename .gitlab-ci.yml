stages:
  - deploy

deploy_to_gcp_vm:
  stage: deploy
  image: python:3.12-slim

  before_script:
    - apt-get update
    - apt-get install -y openssh-client sshpass
    - python -m pip install --upgrade pip
    - pip install "ansible-core>=2.16,<2.17"
    - mkdir -p ~/.ssh
    - printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/newsgenie_oci
    - chmod 600 ~/.ssh/newsgenie_oci
    - ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts
    - export ANSIBLE_SSH_PRIVATE_KEY_FILE=~/.ssh/newsgenie_oci

  script:
    - cd "$CI_PROJECT_DIR"
    - ansible --version
    - ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/deploy_app.yml

  only:
    - main
