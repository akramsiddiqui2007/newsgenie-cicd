script:
  - cd "$CI_PROJECT_DIR"
  - python3 -m venv .venv
  - source .venv/bin/activate
  - pip install "ansible-core>=2.16,<2.17"
  
  # 1. Create the .ssh directory and a file for the key
  - mkdir -p ~/.ssh
  - echo "$SSH_PRIVATE_KEY" > ~/.ssh/newsgenie_key
  
  # 2. Fix permissions (SSH will fail if the file is too public)
  - chmod 700 ~/.ssh
  - chmod 600 ~/.ssh/newsgenie_key
  
  # 3. Use the PATH to the file in your command
  - export ANSIBLE_HOST_KEY_CHECKING=False
  - ansible-playbook -i ansible/inventory/hosts.yml --private-key ~/.ssh/newsgenie_key ansible/playbooks/deploy_app.yml
