apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.15.0
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/gitops/monitoring/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/akramsiddiqui2007/newsgenie-cicd.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/akramsiddiqui2007/newsgenie-cicd.git
      targetRevision: main
      path: gitops/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: monitoring-grafana
      namespace: monitoring
      jqPathExpressions:
        - '.spec.template.metadata.annotations."checksum/config"'
        - '.spec.template.metadata.annotations."checksum/dashboards-json-config"'
        - '.spec.template.metadata.annotations."checksum/sc-dashboard-provider-config"'
        - '.spec.template.metadata.annotations."checksum/secret"'
  syncPolicy:
    automated: {}
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
