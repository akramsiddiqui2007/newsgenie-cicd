apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newsgenie
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akramsiddiqui2007/newsgenie-cicd.git
    targetRevision: main
    path: gitops/newsgenie
  destination:
    server: https://kubernetes.default.svc
    namespace: newsgenie
  syncPolicy: {}
